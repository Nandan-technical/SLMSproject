<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SLMS Login</title>

<style>
/* ================= GLOBAL ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at top, #1a2a6c, #000);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ================= ANIMATED BACKGROUND ================= */
.bg {
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(
        45deg,
        #00c6ff,
        #0072ff,
        #6a11cb,
        #2575fc
    );
    animation: bgRotate 20s linear infinite;
    filter: blur(120px);
    opacity: 0.6;
}

@keyframes bgRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ================= LOGIN CARD ================= */
.login-box {
    position: relative;
    width: 380px;
    padding: 40px 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    color: #fff;
    text-align: center;
    z-index: 10;
    transition: transform 0.2s ease;
}

/* Floating animation */
.login-box::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(120deg,#00c6ff,#7f00ff,#00c6ff);
    z-index: -1;
    animation: borderGlow 6s linear infinite;
}

@keyframes borderGlow {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

/* ================= TEXT ================= */
.login-box h2 {
    font-size: 26px;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.login-box p {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 30px;
}

/* ================= INPUT GROUP ================= */
.input-group {
    position: relative;
    margin-bottom: 22px;
}

.input-group input {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 14px;
}

.input-group label {
    position: absolute;
    top: 50%;
    left: 18px;
    transform: translateY(-50%);
    font-size: 13px;
    color: #eee;
    pointer-events: none;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top: -6px;
    font-size: 11px;
    color: #00eaff;
}

/* ================= BUTTON ================= */
button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle,rgba(255,255,255,0.5),transparent 70%);
    opacity: 0;
    transition: 0.3s;
}

button:hover::after {
    opacity: 1;
}

button:hover {
    box-shadow: 0 0 25px #00c6ff;
    transform: scale(1.05);
}

/* ================= REGISTER ================= */
.register {
    margin-top: 20px;
    font-size: 13px;
}

.register a {
    color: #ffeb3b;
    text-decoration: none;
    font-weight: bold;
}

/* ================= LOADING ================= */
.loading {
    pointer-events: none;
    opacity: 0.8;
}

.loading::before {
    content: "Authenticating...";
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="login-box" id="card">
    <h2>SLMS LOGIN</h2>
    <p>Staff Leave Management System</p>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="text" name="username" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit" id="btn">Login</button>
    </form>

    <div class="register">
        Don’t have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>

<script>
/* ================= 3D TILT EFFECT ================= */
const card = document.getElementById("card");

document.addEventListener("mousemove", e => {
    let x = (window.innerWidth / 2 - e.clientX) / 25;
    let y = (window.innerHeight / 2 - e.clientY) / 25;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ================= BUTTON LOADING EFFECT ================= */
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {
    btn.classList.add("loading");
    btn.innerText = "Please wait...";
});
</script>

</body>
</html>
