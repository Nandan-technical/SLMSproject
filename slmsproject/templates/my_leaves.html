<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;500;700&display=swap');

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #0f2027, #000);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
}

/* 3D Floating Container */
center {
    width: 92%;
    max-width: 1200px;
    padding: 40px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(22px);
    box-shadow:
        0 0 60px rgba(0, 255, 255, 0.25),
        inset 0 0 40px rgba(255, 255, 255, 0.15);
    transform-style: preserve-3d;
    animation: float 6s ease-in-out infinite;
}

/* Floating animation */
@keyframes float {
    0%, 100% { transform: translateY(0) rotateX(0deg); }
    50% { transform: translateY(-15px) rotateX(2deg); }
}

/* Title */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #00ffff, #00ff88, #00ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(0,255,255,0.6);
    margin-bottom: 35px;
}

/* Table */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 15px;
    perspective: 1200px;
}

/* Header */
th {
    background: linear-gradient(135deg, #00f2fe, #4facfe);
    color: #000;
    padding: 18px;
    font-size: 1.1rem;
    text-transform: uppercase;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(79,172,254,0.8);
}

/* Rows */
tr {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    transform-style: preserve-3d;
    transition: all 0.4s ease;
}

/* Row Hover – 3D lift */
tr:hover {
    transform: translateZ(30px) scale(1.02);
    box-shadow:
        0 20px 40px rgba(0,255,255,0.35),
        inset 0 0 20px rgba(255,255,255,0.2);
}

/* Cells */
td {
    padding: 18px;
    text-align: center;
    color: #eaffff;
    font-size: 1rem;
    border-radius: 12px;
}

/* Status styling */
td:last-child {
    font-weight: bold;
    letter-spacing: 1px;
}

/* Status glow effects (optional if values match) */
td:last-child:contains("Approved") {
    color: #00ff88;
}
td:last-child:contains("Rejected") {
    color: #ff4b4b;
}
td:last-child:contains("Pending") {
    color: #ffd700;
}

/* Empty row */
tr td[colspan] {
    font-size: 1.2rem;
    color: #ffcc00;
    background: rgba(255, 204, 0, 0.08);
}

/* Back link */
a {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 40px;
    border-radius: 40px;
    font-weight: 600;
    text-decoration: none;
    color: #000;
    background: linear-gradient(135deg, #00ffff, #00ff88);
    box-shadow: 0 0 35px rgba(0,255,255,0.9);
    transition: all 0.4s ease;
}

a:hover {
    transform: translateY(-4px) scale(1.08);
    box-shadow: 0 0 60px rgba(0,255,255,1);
}
</style>

<body>
    <center>
        <h1>my leaves</h1>
        <table border="5px">
            <tr>
                <th>Leave type</th>
                <th>Start date</th>
                <th>end date</th>
                <th>reason</th>
                <th>status</th>
               
            </tr>
            {% for leave1 in leaves %}
            <tr>
                <td>{{leave1.leave_type}}</td>
                <td>{{leave1.start_date}}</td>
                <td>{{leave1.end_date}}</td>
                <td>{{leave1.reason}}</td>
                <td>{{leave1.status}}</td>
            </tr>
                {% empty %}
            <tr>
                <td colspan="5">No leave applications pending</td>
            </tr>
         {% endfor %}
      
        </table>
        <p>
            <a href="{% url 'staff_dashboard' %}"> Back to staff dashboard</a>
        </p>
    </center>
</body>
</html>
