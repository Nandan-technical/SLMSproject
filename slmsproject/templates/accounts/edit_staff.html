<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
/* ===== GLOBAL RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #0f2027, #203a43, #000);
    overflow:hidden;
}

/* ===== BACKGROUND ANIMATION ===== */
body::before,
body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter: blur(120px);
    animation: float 10s infinite alternate;
}

body::before{
    background:#00f2ff;
    top:-100px;
    left:-100px;
}

body::after{
    background:#ff00e6;
    bottom:-100px;
    right:-100px;
}

@keyframes float{
    0%{ transform: translateY(0) translateX(0); }
    100%{ transform: translateY(-60px) translateX(60px); }
}

/* ===== GLASS CARD ===== */
center{
    position:relative;
    padding:40px 45px;
    width:420px;
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 0 40px rgba(0,255,255,0.2),
        inset 0 0 20px rgba(255,255,255,0.05);
    animation: cardIn 1.2s ease forwards;
    transform-style: preserve-3d;
}

@keyframes cardIn{
    from{
        opacity:0;
        transform: rotateX(20deg) translateY(60px);
    }
    to{
        opacity:1;
        transform: rotateX(0) translateY(0);
    }
}

/* ===== TITLE ===== */
h2{
    color:#fff;
    margin-bottom:25px;
    font-weight:600;
    letter-spacing:1px;
    position:relative;
}

h2::after{
    content:'';
    width:70px;
    height:3px;
    background: linear-gradient(90deg,#00f2ff,#ff00e6);
    display:block;
    margin:10px auto 0;
    border-radius:10px;
}

/* ===== FORM ===== */
form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* ===== LABEL ===== */
label{
    color:#c9faff;
    font-size:14px;
    text-align:left;
    letter-spacing:0.5px;
}

/* ===== INPUT FIELDS ===== */
input{
    padding:14px 15px;
    border-radius:12px;
    border:none;
    outline:none;
    background: rgba(0,0,0,0.45);
    color:#fff;
    font-size:15px;
    transition: all 0.4s ease;
    box-shadow: inset 0 0 0 rgba(0,255,255,0);
}

input:focus{
    transform: translateY(-3px) scale(1.02);
    box-shadow:
        0 0 15px rgba(0,255,255,0.6),
        inset 0 0 5px rgba(0,255,255,0.4);
}

/* ===== BUTTON ===== */
button{
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:30px;
    font-size:16px;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    color:#000;
    background: linear-gradient(135deg,#00f2ff,#ff00e6);
    transition: all 0.4s ease;
    position:relative;
    overflow:hidden;
}

/* Button shine */
button::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.7),
        transparent
    );
    transition:0.5s;
}

button:hover::before{
    left:100%;
}

button:hover{
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 0 25px rgba(255,0,230,0.8);
}

button:active{
    transform: scale(0.96);
}

/* ===== LINK ===== */
p{
    margin-top:20px;
}

a{
    color:#00f2ff;
    text-decoration:none;
    font-size:14px;
    position:relative;
}

a::after{
    content:'';
    width:0%;
    height:2px;
    background:#ff00e6;
    position:absolute;
    left:0;
    bottom:-4px;
    transition:0.4s;
}

a:hover::after{
    width:100%;
}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
    center{
        width:90%;
        padding:30px;
    }
}
</style>

<body>
    <center>
        <h2>you can edit staff details</h2>
        <form method="Post">
            {% csrf_token %}
            <label >Username</label>
            <input type="text" name="username" value="{{staff.username}}" required>
            <label >Password</label>
            <input type="password" name="password"  placeholder="leave to blank" required>
            <button type="submit">submit</button>
        </form>
        <p><a href="{% url 'manage_staff' %}">Back to mange staff</a></p>
    </center>
</body>
</html>
