<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* ===== ANIMATED BACKGROUND ===== */
body {
    min-height: 100vh;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== GLOWING BLOBS ===== */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, #00f2ff, transparent);
    filter: blur(120px);
    animation: float 8s infinite alternate;
}

body::after {
    background: radial-gradient(circle, #ff00d4, transparent);
    animation-delay: 4s;
}

@keyframes float {
    from { transform: translateY(-40px); }
    to { transform: translateY(40px); }
}

/* ===== GLASS CARD ===== */
.container {
    width: 380px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 40px rgba(0,255,255,0.3);
    animation: cardPop 1.2s ease;
    position: relative;
    z-index: 2;
}

@keyframes cardPop {
    from {
        transform: scale(0.7) translateY(60px);
        opacity: 0;
    }
    to {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
}

/* ===== TITLE ===== */
h1 {
    text-align: center;
    color: #fff;
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 25px;
    text-shadow: 0 0 15px #00f2ff;
}

/* ===== INPUT GROUP ===== */
.input-box {
    position: relative;
    margin-bottom: 22px;
}

.input-box input {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: 0.4s;
}

.input-box input::placeholder {
    color: rgba(255,255,255,0.6);
}

/* INPUT GLOW */
.input-box input:focus {
    border-color: #00f2ff;
    box-shadow: 0 0 15px #00f2ff;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #00f2ff, #ff00d4);
    background-size: 200%;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    transition: 0.4s;
    box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

/* BUTTON ANIMATION */
button:hover {
    background-position: right;
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 45px rgba(255,0,212,0.8);
}

/* BUTTON CLICK */
button:active {
    transform: scale(0.96);
}

/* ===== BACK LINK ===== */
.back-link {
    margin-top: 20px;
    text-align: center;
}

.back-link a {
    color: #00f2ff;
    text-decoration: none;
    font-size: 14px;
    position: relative;
}

/* LINK UNDERLINE ANIMATION */
.back-link a::after {
    content: "";
    width: 0;
    height: 2px;
    background: #00f2ff;
    position: absolute;
    left: 0;
    bottom: -4px;
    transition: 0.4s;
}

.back-link a:hover::after {
    width: 100%;
}
</style>

<div class="container">
    <h1>ADD YOUR DETAILS</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Create Staff</button>
    </form>

    <div class="back-link">
        <a href="{% url 'manage_staff' %}">← Back to Manage Staff</a>
    </div>
</div>
</body>


</html>
