<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    center {
        background: #ffffff;
        padding: 40px 50px;
        border-radius: 18px;
        width: 650px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        animation: fadeIn 0.8s ease-in-out;
    }

    h1 {
        margin-bottom: 30px;
        color: #333;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 12px;
        overflow: hidden;
    }

    th {
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: white;
        padding: 14px;
        font-size: 16px;
        text-transform: uppercase;
    }

    td {
        padding: 14px;
        text-align: center;
        font-size: 15px;
        color: #333;
    }

    tr {
        transition: all 0.3s ease;
    }

    tr:nth-child(even) {
        background-color: #f9fafb;
    }

    tr:hover {
        background-color: #eef2ff;
        transform: scale(1.01);
    }

    a {
        text-decoration: none;
        padding: 8px 14px;
        margin: 0 5px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        display: inline-block;
    }

    a[href="#"]:first-child {
        background-color: #22c55e;
        color: white;
    }

    a[href="#"]:first-child:hover {
        background-color: #16a34a;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(34, 197, 94, 0.4);
    }

    a[href="#"]:last-child {
        background-color: #ef4444;
        color: white;
    }

    a[href="#"]:last-child:hover {
        background-color: #dc2626;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(239, 68, 68, 0.4);
    }

    p a {
        background: linear-gradient(135deg, #0ea5e9, #2563eb);
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 500;
    }

    p a:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 16px rgba(37, 99, 235, 0.4);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<body>
    <center>
        <h1>MANAGE STAFF</h1>
        <table border="5px">
            <tr>
                <th>Username</th>
                <th>actions</th>
            </tr>
            {% for staff in staff_list %}
            <tr>
               <td>
                 {{staff.username}}
               </td>
               <td>
                <a href="{% url 'edit_staff' staff.id  %}">Edit</a>
                <a href="{% url 'delete_staff' staff.id %}" onclick="return confirm('are you sure?')">delete</a>
               </td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <p><a href="{% url 'admin_dashboard' %}">back to dashboard</a></p>
    </center>
</body>
</html>
