<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BACKGROUND */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        radial-gradient(circle at top left, #00f5ff, transparent 40%),
        radial-gradient(circle at bottom right, #ff00e0, transparent 40%),
        linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    perspective: 1500px;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* FLOATING LIGHTS */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: #00f5ff;
    filter: blur(180px);
    top: -100px;
    left: -100px;
    animation: floatLight 8s infinite alternate ease-in-out;
}

body::after {
    content: "";
    position: absolute;
    width: 350px;
    height: 350px;
    background: #ff00e0;
    filter: blur(160px);
    bottom: -100px;
    right: -100px;
    animation: floatLight 10s infinite alternate ease-in-out;
}

@keyframes floatLight {
    from { transform: translateY(0); }
    to { transform: translateY(60px); }
}

/* 3D CARD */
.leave-card {
    position: relative;
    width: 420px;
    padding: 30px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow:
        0 30px 60px rgba(0,0,0,0.6),
        inset 0 0 20px rgba(255,255,255,0.15);
    transform-style: preserve-3d;
    animation: cardEntry 1.2s ease forwards;
}

/* CARD ENTRY */
@keyframes cardEntry {
    from {
        opacity: 0;
        transform: rotateX(35deg) translateY(80px);
    }
    to {
        opacity: 1;
        transform: rotateX(0deg) translateY(0);
    }
}

/* TITLE */
.leave-card h2 {
    text-align: center;
    color: #fff;
    margin-bottom: 25px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 15px #00f5ff;
}

/* LABELS */
label {
    display: block;
    margin-top: 16px;
    color: #e0e0e0;
    font-size: 14px;
    letter-spacing: 1px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 14px;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
    transition: 0.4s ease;
}

/* 3D FOCUS EFFECT */
input:focus,
select:focus,
textarea:focus {
    transform: translateZ(12px) scale(1.02);
    box-shadow:
        0 0 15px #00f5ff,
        inset 0 0 10px rgba(255,255,255,0.3);
}

/* TEXTAREA */
textarea {
    resize: none;
}

/* SUBMIT BUTTON */
button {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00f5ff, #ff00e0);
    color: #000;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow:
        0 20px 35px rgba(0,0,0,0.6),
        0 0 25px #ff00e0;
    transition: 0.4s ease;
}

/* BUTTON HOVER (3D POP) */
button:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow:
        0 30px 50px rgba(0,0,0,0.8),
        0 0 35px #00f5ff;
}

/* BUTTON CLICK */
button:active {
    transform: translateY(2px) scale(0.98);
}

/* GLOW BORDER */
.leave-card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 24px;
    background: linear-gradient(135deg, #00f5ff, #ff00e0);
    filter: blur(20px);
    opacity: 0.6;
    z-index: -1;
}
</style>

<body>
    

<div class="leave-card">
    <h2>Apply Leave</h2>

    <form method="Post">
        {% csrf_token %}

        <label>Leave Type</label>
        <select name="leave_type" required>
            <option value="">-- Select --</option>
            <option value="Sick Leave">Sick Leave</option>
            <option value="Casual Leave">Casual Leave</option>
            <option value="Emergency Leave">Emergency Leave</option>
        </select>

        <label>Start Date</label>
        <input type="date" name="start_date" required>

        <label>End Date</label>
        <input type="date" name="end_date" required>

        <label>Reason</label>
        <textarea name="reason" rows="4" required></textarea>

        <button type="submit">Submit Leave</button>
    </form>
</div>

</body>
</html>
