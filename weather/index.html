<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Weather</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#0f2027;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.card{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    margin:15px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    width:60%;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

#map{
    height:300px;
    width:350px;
    border-radius:15px;
    margin-top:10px;
}

.hourly{
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.hour{
    min-width:80px;
    padding:10px;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
}

canvas{
    max-width:350px;
}

/* Rain Animation */
.rain{
    position:absolute;
    width:2px;
    height:15px;
    background:white;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100vh)}
    to{transform:translateY(100vh)}
}

</style>
</head>

<body>

<div class="card">

<h2>Ultimate Weather</h2>

<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="getWeather()">Search</button>
<button onclick="voiceSearch()">🎤</button>

<h2 id="city"></h2>
<h1 id="temp"></h1>
<p id="condition"></p>
<p id="extra"></p>

</div>

<div class="card">
<h3>Hourly Forecast</h3>
<div class="hourly" id="hourly"></div>
</div>

<div class="card">
<h3>7 Day Forecast</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Live Map</h3>
<div id="map"></div>
</div>

<script>

const apikey="defe3259d2413c173f484bb1ed5b2d25";
let map;

/* Voice Search */
function voiceSearch(){
    const recognition=new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.onresult=e=>{
        const city=e.results[0][0].transcript;
        document.getElementById("cityInput").value=city;
        getWeather();
    }
    recognition.start();
}

/* Rain Animation */
function createRain(){
    document.querySelectorAll(".rain").forEach(e=>e.remove());
    for(let i=0;i<120;i++){
        let drop=document.createElement("div");
        drop.className="rain";
        drop.style.left=Math.random()*100+"vw";
        drop.style.animationDuration=(0.5+Math.random())+"s";
        document.body.appendChild(drop);
    }
}

/* Weather */
async function getWeather(cityParam){

    let city=cityParam || document.getElementById("cityInput").value;
    if(!city) return;

    const res=await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apikey}`
    );

    const data=await res.json();

    if(data.cod!=200){
        alert("City not found");
        return;
    }

    document.getElementById("city").innerText=data.name;
    document.getElementById("temp").innerText=Math.round(data.main.temp)+"°C";
    document.getElementById("condition").innerText=data.weather[0].main;
    document.getElementById("extra").innerText=
        `Humidity ${data.main.humidity}% | Wind ${data.wind.speed} km/h`;

    if(data.weather[0].main.toLowerCase().includes("rain")){
        createRain();
    }

    loadForecast(data.coord.lat,data.coord.lon);
    initMap(data.coord.lat,data.coord.lon);
}

/* Forecast + Hourly */
async function loadForecast(lat,lon){

    const res=await fetch(
        `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${apikey}`
    );

    const data=await res.json();

    /* Hourly */
    const hourlyDiv=document.getElementById("hourly");
    hourlyDiv.innerHTML="";

    data.list.slice(0,8).forEach(item=>{
        const div=document.createElement("div");
        div.className="hour";
        div.innerHTML=`
            <p>${item.dt_txt.split(" ")[1].slice(0,5)}</p>
            <p>${Math.round(item.main.temp)}°C</p>
        `;
        hourlyDiv.appendChild(div);
    });

    /* Chart */
    const temps=data.list.slice(0,7).map(i=>i.main.temp);
    const labels=data.list.slice(0,7).map(i=>i.dt_txt.split(" ")[0]);

    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label:"Temp °C",
                data:temps,
                borderColor:"cyan",
                fill:false
            }]
        }
    });

}

/* Map */
function initMap(lat,lon){

    if(map){
        map.remove();
    }

    map=L.map('map').setView([lat,lon],10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap'
    }).addTo(map);

    L.marker([lat,lon]).addTo(map);

}

/* Auto GPS */
navigator.geolocation.getCurrentPosition(async pos=>{

    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const res=await fetch(
        `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apikey}`
    );

    const data=await res.json();
    getWeather(data.name);

});

</script>

</body>
</html>
